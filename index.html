<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gastos">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Gastos Semanales</title>
  <style>
    /* ── Variables de color oscuro ────────────────────────────── */
    :root {
      --bg:       #0f1117;
      --bg2:      #1a1d27;
      --bg3:      #22263a;
      --border:   rgba(255,255,255,.07);
      --border2:  rgba(255,255,255,.12);
      --text:     #f0f2ff;
      --text2:    #8b92b0;
      --text3:    #555d7a;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --green:    #22d3a5;
      --red:      #ff5e7a;
      --orange:   #ff9f43;
      --purple:   #a78bfa;
      --yellow:   #ffd166;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg)}
    .app{max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;min-height:100vh}

    /* ── Topbar ─────────────────────────────────────────────────── */
    .topbar{
      background:linear-gradient(135deg,#1e1b4b 0%,#2d1b6e 100%);
      color:var(--text);padding:12px 16px;
      padding-top:calc(12px + env(safe-area-inset-top));
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:50;
      border-bottom:1px solid rgba(108,99,255,.2);
    }
    .topbar h1{font-size:16px;font-weight:600;color:var(--text);letter-spacing:.3px}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s}
    .icon-btn{background:rgba(108,99,255,.25);border:1px solid rgba(108,99,255,.3);color:var(--text);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center}
    .refresh-btn{background:rgba(108,99,255,.2);border:1px solid rgba(108,99,255,.3);color:var(--accent2);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px}
    .refresh-btn:active{opacity:.7}

    /* ── Tabs ───────────────────────────────────────────────────── */
    .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:calc(50px + env(safe-area-inset-top));z-index:40;overflow-x:auto}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex:1;min-width:48px;padding:8px 2px;text-align:center;font-size:10px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
    .tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
    .tab svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

    /* ── Content ────────────────────────────────────────────────── */
    .content{flex:1;padding:14px;display:none}
    .content.active{display:block}

    /* ── Stats ──────────────────────────────────────────────────── */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat-card{
      background:var(--bg2);border-radius:14px;padding:14px;
      border:1px solid var(--border);
      position:relative;overflow:hidden;
    }
    .stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:var(--accent);opacity:.06}
    .stat-label{font-size:11px;color:var(--text2);margin-bottom:5px;letter-spacing:.3px}
    .stat-val{font-size:18px;font-weight:700;color:var(--text)}
    .stat-val.red{color:var(--red)}
    .stat-val.green{color:var(--green)}
    .stat-val.purple{color:var(--purple)}
    .stat-val.orange{color:var(--orange)}

    /* ── Cards ──────────────────────────────────────────────────── */
    .card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
    .card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

    /* ── Progress ───────────────────────────────────────────────── */
    .progress-bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px}
    .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s cubic-bezier(.4,0,.2,1)}
    .progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
    .progress-fill.over{background:linear-gradient(90deg,var(--red),#ff8fa3)}

    /* ── Buttons ────────────────────────────────────────────────── */
    .btn-teal{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:white;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.3px}
    .btn-teal:active{opacity:.85}
    .btn-outline{padding:12px 16px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:12px;font-size:13px;cursor:pointer}
    .btn-cancel{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border2);background:transparent;font-size:13px;color:var(--text2);cursor:pointer}
    .btn-save{flex:2;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:white;font-size:13px;font-weight:600;cursor:pointer}
    .btn-abonar{flex:1;padding:8px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;font-size:12px;font-weight:600;cursor:pointer}
    .btn-retirar{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer}
    .btn-marcar-pagado{width:100%;margin-top:10px;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#34d399);color:#0f2a1f;font-size:12px;font-weight:700;cursor:pointer}
    .btn-marcar-pend{width:100%;margin-top:10px;padding:9px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer}
    .action-row{display:flex;gap:8px;margin-top:4px}

    /* ── Saldos ─────────────────────────────────────────────────── */
    .saldo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .saldo-row:last-child{border-bottom:none}
    .saldo-nombre{font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .saldo-monto{font-size:13px;font-weight:600;color:var(--text)}

    /* ── Search & filters ───────────────────────────────────────── */
    .search-wrap{position:relative;margin-bottom:10px}
    .search-wrap input{width:100%;padding:10px 12px 10px 34px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);font-size:14px;color:var(--text)}
    .search-wrap input::placeholder{color:var(--text3)}
    /* Dropdown de comentarios */
    #comentario-dropdown{background:var(--bg2) !important;border:1px solid var(--border2) !important;border-radius:12px !important;box-shadow:0 8px 24px rgba(0,0,0,.5) !important}
    #comentario-dropdown div{color:var(--text) !important;padding:10px 14px;cursor:pointer;font-size:14px}
    #comentario-dropdown div:hover{background:var(--bg3) !important}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
    .filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .2s}
    .chip.active{background:var(--accent);color:white;border-color:var(--accent)}

    /* ── Gasto items ────────────────────────────────────────────── */
    .gasto-item{
      background:var(--bg2);border-radius:14px;border:1px solid var(--border);
      padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
      cursor:pointer;transition:border-color .2s;
    }
    .gasto-item:active{background:var(--bg3)}
    .gasto-item.ext-pend{border-left:3px solid var(--orange);border-radius:0 14px 14px 0}
    .gasto-item.ext-paid{border-left:3px solid var(--green);border-radius:0 14px 14px 0}
    .gasto-icon{width:38px;height:38px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .gasto-info{flex:1;min-width:0}
    .gasto-motivo{font-size:13px;font-weight:600;color:var(--text)}
    .gasto-meta{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600}
    .badge.ab{background:rgba(34,211,165,.15);color:var(--green)}
    .badge.pend{background:rgba(255,94,122,.15);color:var(--red)}
    .badge.ignorar{background:rgba(167,139,250,.15);color:var(--purple)}
    .badge.ext{background:rgba(255,159,67,.15);color:var(--orange)}
    .badge.ext-paid{background:rgba(34,211,165,.15);color:var(--green)}
    .gasto-monto{font-size:15px;font-weight:700;color:var(--text);flex-shrink:0}
    .empty{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px}

    /* ── Form ───────────────────────────────────────────────────── */
    .form-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:16px}
    .field{margin-bottom:14px}
    .field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
    .req{color:var(--red)}
    .field select,.field input[type=number],.field input[type=text],.field input[type=date],.field textarea{
      width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border2);
      background:var(--bg3);font-size:16px;color:var(--text);font-family:inherit;-webkit-text-fill-color:var(--text)}
    .field select option{background:var(--bg2);color:var(--text)}
    .field input::placeholder,.field textarea::placeholder{color:var(--text3)}
    input[type=color]{cursor:pointer}
    .field textarea{resize:vertical;min-height:55px;font-size:13px}
    .toggle-group{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .toggle-group.three{grid-template-columns:1fr 1fr 1fr}
    .tog{padding:10px 4px;border-radius:10px;border:1px solid var(--border2);text-align:center;cursor:pointer;font-size:12px;color:var(--text2);background:var(--bg3);transition:all .15s;font-weight:500}
    .tog.sel-no{background:var(--red);color:white;border-color:var(--red)}
    .tog.sel-si{background:var(--green);color:#0f2a1f;border-color:var(--green)}
    .tog.sel-ig{background:var(--purple);color:white;border-color:var(--purple)}
    .tog.sel-ext{background:var(--orange);color:#1a0e00;border-color:var(--orange)}
    .form-actions{display:flex;gap:8px;margin-top:6px}

    /* ── Externos ───────────────────────────────────────────────── */
    .ext-resumen{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
    .ext-stat-row{display:flex;gap:8px}
    .ext-stat{flex:1;text-align:center}
    .ext-stat-val{font-size:18px;font-weight:700}
    .ext-stat-label{font-size:10px;color:var(--text2);margin-top:2px}
    .ext-item{background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:13px;margin-bottom:8px}
    .ext-item.pagado{opacity:.6}
    .ext-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .ext-nombre{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
    .ext-monto{font-size:14px;font-weight:700;color:var(--orange)}
    .ext-monto.pagado{color:var(--green);text-decoration:line-through}
    .ext-meta{font-size:11px;color:var(--text2)}

    /* ── Cortes ─────────────────────────────────────────────────── */
    .tarjeta-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
    .tarjeta-card:active{background:var(--bg3)}
    .tarjeta-header{display:flex;align-items:center;justify-content:space-between}
    .tarjeta-nombre{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px}
    .tarjeta-monto{font-size:16px;font-weight:700;color:var(--red)}
    .tarjeta-info{font-size:11px;color:var(--text2);margin-top:5px}
    .periodo-badge{padding:4px 10px;border-radius:20px;font-size:11px;background:var(--bg3);color:var(--text2);cursor:pointer;border:1px solid var(--border2);font-weight:500}
    .periodo-badge.active{background:var(--accent);color:white;border-color:var(--accent)}

    /* ── Ahorros ────────────────────────────────────────────────── */
    .ahorro-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:10px}
    .ahorro-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
    .ahorro-nombre{font-size:13px;font-weight:600;color:var(--text)}
    .ahorro-total{font-size:16px;font-weight:700;color:var(--purple)}
    .ahorro-progress{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:5px}
    .ahorro-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,var(--purple))}
    .ahorro-meta-row{font-size:10px;color:var(--text2);display:flex;justify-content:space-between;margin-bottom:10px}
    .mov-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
    .mov-item:last-child{border-bottom:none}
    .mov-pos{color:var(--green);font-weight:600}
    .mov-neg{color:var(--red);font-weight:600}
    .ahorro-btns{display:flex;gap:6px;margin-top:12px}
    .btn-nueva-cuenta{width:100%;padding:13px;border-radius:12px;border:1px dashed rgba(108,99,255,.3);background:transparent;color:var(--accent2);font-size:13px;cursor:pointer;margin-top:4px;font-weight:500}

    /* ── Histórico ──────────────────────────────────────────────── */
    .semana-group{margin-bottom:16px}
    .semana-header{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;justify-content:space-between}
    .hist-item{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:10px 13px;margin-bottom:5px;display:flex;align-items:center;gap:9px}
    .hist-info{flex:1}
    .hist-motivo{font-size:12px;font-weight:600;color:var(--text)}
    .hist-meta{font-size:10px;color:var(--text2);margin-top:1px}
    .hist-monto{font-size:13px;font-weight:700;color:var(--text2)}

    /* ── Modals ─────────────────────────────────────────────────── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
    .overlay.open{display:flex}
    .modal{background:var(--bg2);border-radius:20px;padding:20px;width:100%;max-width:340px;max-height:85vh;overflow-y:auto;border:1px solid var(--border2)}
    .modal h2{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text)}
    .modal p{font-size:13px;color:var(--text2)}
    .modal-actions{display:flex;gap:8px;margin-top:16px}
    .mbtn{flex:1;padding:11px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600}
    .mbtn.sec{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
    .mbtn.danger{background:rgba(255,94,122,.12);border:1px solid rgba(255,94,122,.3);color:var(--red)}
    .mbtn.prim{background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;color:white}
    .mbtn.purple{background:linear-gradient(135deg,#7c3aed,var(--purple));border:none;color:white}

    /* ── Toast ──────────────────────────────────────────────────── */
    .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(30,27,75,.95);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(108,99,255,.3);backdrop-filter:blur(8px)}
    .toast.show{opacity:1}

    /* ── Loading ─────────────────────────────────────────────────── */
    .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:14px}
    .loading-overlay p{color:var(--text2);font-size:14px}
    .spinner{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spin-small{to{transform:rotate(360deg)}}
    .spinning{animation:spin-small .7s linear infinite;display:inline-block}

    /* ── Menú lateral (drawer) ──────────────────────────────────── */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none;backdrop-filter:blur(2px)}
    .drawer-overlay.open{display:block}
    .drawer{position:fixed;right:0;top:0;bottom:0;width:240px;background:var(--bg2);z-index:160;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-top:env(safe-area-inset-top);border-left:1px solid var(--border2)}
    .drawer.open{transform:translateX(0)}
    .drawer-header{padding:20px 18px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
    .drawer-item{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;border-bottom:1px solid var(--border)}
    .drawer-item:active{background:var(--bg3)}
    .drawer-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
    .drawer-item.active-item{color:var(--accent2)}

    /* ── FAB botón Nuevo ───────────────────────────────────────── */
    .fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;color:white;font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,.5);z-index:90;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .15s}
    .fab:active{transform:scale(.92)}

    /* ── Fix ojito en stat-card (z-index y pointer-events) ──────── */
    .stat-card{position:relative}
    #btn-eye-menu{position:absolute;top:10px;right:10px;z-index:10;padding:4px;touch-action:manipulation}

    /* ── Fix texto externos ─────────────────────────────────────── */
    .ext-nombre{color:var(--text) !important}
    .ext-meta{color:var(--text2) !important}
    .ext-item .ext-meta strong{color:var(--orange)}
    .ext-item.pagado .ext-meta strong{color:var(--green)}

    /* ── Fix color inline que quedó hardcodeado ─────────────────── */
    #p-nums{color:var(--text2) !important}
    #p-pct,#p-resta{color:var(--text2) !important}
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>Cargando tus datos...</p>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <h1 id="topbar-title">Gastos Semanales</h1>
      <span class="sync-dot" id="sync-dot"></span>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshData()" title="Actualizar">⟳ Actualizar</button>
      <button class="icon-btn" onclick="openDrawer()" title="Más opciones" style="font-size:17px">☰</button>
    </div>
  </div>

  <!-- Drawer lateral -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">Más opciones</div>
    <div class="drawer-item" id="drawer-historico" onclick="closeDrawer();showTab('historico')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Historial
    </div>
    <div class="drawer-item" id="drawer-catalogos" onclick="closeDrawer();showTab('catalogos')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/><circle cx="17" cy="17" r="3"/><path d="M19 19l2 2"/></svg>Catálogos
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-menu" onclick="showTab('menu')">
